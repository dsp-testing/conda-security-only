name: Conda dependency submission

on:
  workflow_dispatch:
  push:

permissions: 
  id-token: write
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Conda dependency scanning
        #uses: jhutchings1/conda-dependency-submission-action@v0.0.2
        uses: theztefan/conda-dependency-submission-action@theztefan/treat-as-python
        with:
          filePattern: environment.yml
          treatAsPython: true
